apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "docextractor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "docextractor.selectorLabels" (dict "ctx" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 80
