apiVersion: v1
kind: Service
metadata:
  name: {{ include "docextractor.backendServiceName" . }}
  labels:
    {{- include "docextractor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "docextractor.selectorLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
