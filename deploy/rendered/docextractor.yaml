---
# Source: docextractor/templates/frontend-nginx-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: docextractor-frontend-nginx
  labels:
    app.kubernetes.io/name: docextractor
    app.kubernetes.io/instance: docextractor
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: docextractor-0.1.0
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://docextractor-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
            proxy_send_timeout 60s;
        }

        location /media/ {
            proxy_pass http://docextractor-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

