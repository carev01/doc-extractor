# Source: docextractor/templates/postgres-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: docextractor-postgres
  labels:
    app.kubernetes.io/name: docextractor
    app.kubernetes.io/instance: docextractor
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: docextractor-0.1.0
spec:
  serviceName: docextractor-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docextractor
      app.kubernetes.io/instance: docextractor
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docextractor
        app.kubernetes.io/instance: docextractor
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: "docextractor"
            - name: POSTGRES_USER
              value: "docextractor"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docextractor-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "docextractor"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "docextractor"] }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

