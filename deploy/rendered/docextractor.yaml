# Source: docextractor/templates/scheduler-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docextractor-scheduler
  labels:
    app.kubernetes.io/name: docextractor
    app.kubernetes.io/instance: docextractor
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: docextractor-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docextractor
      app.kubernetes.io/instance: docextractor
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docextractor
        app.kubernetes.io/instance: docextractor
        app.kubernetes.io/component: scheduler
    spec:
      initContainers:
        # Wait for the backend to be healthy — the backend's init container runs the
        # DB migrations, so a ready backend implies the schema exists.
        - name: wait-for-backend
          image: "ghcr.io/carev01/doc-extractor-backend:latest"
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import time, urllib.request
              url = "http://docextractor-backend:8000/api/health"
              while True:
                  try:
                      urllib.request.urlopen(url, timeout=3)
                      break
                  except Exception as e:
                      print("waiting for backend:", e, flush=True)
                      time.sleep(3)
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
      containers:
        - name: scheduler
          image: "ghcr.io/carev01/doc-extractor-backend:latest"
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.scheduler"]
          envFrom:
            - configMapRef: { name: docextractor-config }
            - secretRef: { name: docextractor-secret }
          livenessProbe:
            exec: { command: ["sh", "-c", "pgrep -f 'app.scheduler' >/dev/null"] }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi

