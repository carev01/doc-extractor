# Source: docextractor/templates/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docextractor-backend
  labels:
    app.kubernetes.io/name: docextractor
    app.kubernetes.io/instance: docextractor
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: docextractor-0.1.0
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO volume can attach to only one pod-set at a time
  selector:
    matchLabels:
      app.kubernetes.io/name: docextractor
      app.kubernetes.io/instance: docextractor
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docextractor
        app.kubernetes.io/instance: docextractor
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        # Runs Alembic before the app starts. If Postgres is not yet reachable the
        # connection fails, the init container exits non-zero, and the kubelet retries
        # it (with backoff) until Postgres is ready — so this needs no explicit wait
        # loop and no Helm hook ordering. The app's startup create_all() is a no-op
        # once Alembic has built the schema (checkfirst).
        - name: migrate
          image: "ghcr.io/carev01/doc-extractor-backend:latest"
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: docextractor-config }
            - secretRef: { name: docextractor-secret }
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
      containers:
        - name: backend
          image: "ghcr.io/carev01/doc-extractor-backend:latest"
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef: { name: docextractor-config }
            - secretRef: { name: docextractor-secret }
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - { name: exports, mountPath: /app/exports }
            - { name: media, mountPath: /app/media }
      volumes:
        - name: exports
          persistentVolumeClaim: { claimName: docextractor-exports }
        - name: media
          persistentVolumeClaim: { claimName: docextractor-media }

