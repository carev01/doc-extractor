server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container.
    # Because requests arrive at the same origin (port 80) the browser never
    # makes a cross-origin request, so no CORS headers are needed here.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Extractions can run for several minutes; don't time out early.
        proxy_read_timeout 600s;
        proxy_send_timeout 60s;
    }

    # SPA fallback: unknown paths serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
