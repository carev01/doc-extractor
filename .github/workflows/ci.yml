name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16          # match prod — DDL/enum behaviour is identical
        env:
          POSTGRES_USER: docextractor
          POSTGRES_PASSWORD: docextractor_dev
          POSTGRES_DB: docextractor
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U docextractor"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      # Both URLs + the Firecrawl URL are required settings (no defaults).
      DOCEXTRACTOR_DATABASE_URL: postgresql+asyncpg://docextractor:docextractor_dev@localhost:5432/docextractor
      DOCEXTRACTOR_DATABASE_URL_SYNC: postgresql+psycopg2://docextractor:docextractor_dev@localhost:5432/docextractor
      DOCEXTRACTOR_FIRECRAWL_API_URL: http://firecrawl.invalid
      PGPASSWORD: docextractor_dev
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      # WeasyPrint native deps — mirror backend/Dockerfile (app.main imports the
      # PDF exporter, which dlopen()s Pango at import time).
      - name: Install WeasyPrint system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libfontconfig1 fonts-dejavu-core postgresql-client
      - name: Install Python deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Create test database
        run: psql -h localhost -U docextractor -d docextractor -c 'CREATE DATABASE docextractor_test;'
      # Validates every migration against a real PG16 — catches the DDL/bind/
      # revision bugs that previously only surfaced in the deploy init container.
      - name: alembic upgrade head
        working-directory: backend
        run: alembic upgrade head
      - name: pytest
        working-directory: backend
        run: pytest -q

  images:
    needs: backend-tests
    # Build/push only on main + tags (not on PRs).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            image: ghcr.io/carev01/doc-extractor-backend
          - name: frontend
            context: ./frontend
            image: ghcr.io/carev01/doc-extractor-frontend
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=
